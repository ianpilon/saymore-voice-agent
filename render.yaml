services:
  - type: web
    name: saymore-voice-agent
    runtime: node
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: GLM_API_KEY
        sync: false   # set this in the Render dashboard
      - key: GLM_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4/
      - key: GLM_MODEL
        value: glm-5.2
      - key: NODE_VERSION
        value: 20.0.0
